<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Radio Danmark Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 220px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 35px 0 15px 5px;
            font-weight: 700;
            border-left: 2px solid rgba(255,255,255,0.1);
            padding-left: 10px;
        }

        /* GRID: Maks 3 knapper */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        /* STATION BUTTONS */
        .btn {
            position: relative;
            background: rgba(var(--brand-color), 0.1);
            border: 1px solid rgba(var(--brand-color), 0.2);
            border-radius: 20px;
            padding: 22px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden; /* Vigtigt for glas-reflektion */
            -webkit-tap-highlight-color: transparent;
        }

        .btn .icon {
            font-size: 26px;
            margin-bottom: 8px;
            opacity: 0.7;
            transition: transform 0.4s ease;
            z-index: 2;
        }

        .btn span {
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
            z-index: 2;
        }

        /* HOVER EFFEKT */
        .btn:hover {
            transform: translateY(-5px) scale(1.04);
            background: rgba(var(--brand-color), 0.15);
            border-color: rgba(var(--brand-color), 0.4);
            color: #fff;
        }

        /* GLAS REFLEKTION (Shimmer) */
        .btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.6s;
            z-index: 1;
        }

        .btn:hover::after {
            left: 150%;
        }

        /* ACTIVE / PLAYING STATE */
        .btn.playing {
            background: rgba(var(--brand-color), 0.3);
            border-color: rgba(var(--brand-color), 0.9);
            color: #fff;
            box-shadow: 0 10px 25px rgba(var(--brand-color), 0.3);
            transform: scale(1.04);
        }

        .btn.playing .icon {
            opacity: 1;
            transform: scale(1.2);
        }

        /* BRAND FARVER */
        .nova { --brand-color: 46, 204, 113; }
        .r100 { --brand-color: 52, 152, 219; }
        .soft { --brand-color: 41, 128, 185; }
        .soft-l { --brand-color: 135, 206, 250; }
        .voice { --brand-color: 230, 230, 230; }
        .pop { --brand-color: 155, 89, 182; }
        .mix { --brand-color: 233, 30, 99; }
        .dr { --brand-color: 231, 76, 60; }
        .vinyl { --brand-color: 243, 156, 18; }
        .retro { --brand-color: 211, 84, 0; }
        .party { --brand-color: 241, 196, 15; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 450px;
            background: rgba(15, 15, 15, 0.96);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 16px 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .info-stack { display: flex; flex-direction: column; }
        
        #current-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(var(--active-brand, 255, 255, 255), 1);
            font-weight: 800;
            transition: color 0.4s ease;
        }

        #current-name { font-size: 17px; font-weight: 700; margin-top: 2px; }

        .play-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { fill: #000; width: 24px; height: 24px; }

        video { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">Populære</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova', this)" class="btn nova"><span class="icon">✨</span><span>Nova</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100', this)" class="btn r100"><span class="icon">💯</span><span>Radio 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Radio Soft', this)" class="btn soft"><span class="icon">☁️</span><span>Radio Soft</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice', this)" class="btn voice"><span class="icon">🎤</span><span>The Voice</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM', this)" class="btn pop"><span class="icon">🎸</span><span>PopFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Mix 7', this)" class="btn mix"><span class="icon">🕺</span><span>Mix 7</span></div>
    </div>

    <div class="section-title">DR Stationer</div>
    <div class="grid">
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p1/playlist-320000.m3u8', 'P1', this)" class="btn dr"><span class="icon">📰</span><span>P1</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p2/playlist-320000.m3u8', 'P2', this)" class="btn dr"><span class="icon">🎻</span><span>P2</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8', 'P3', this)" class="btn dr"><span class="icon">⚡</span><span>P3</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p4sjaelland/masterab.m3u8', 'P4', this)" class="btn dr"><span class="icon">📍</span><span>P4</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p5/playlist-320000.m3u8', 'P5', this)" class="btn dr"><span class="icon">☕</span><span>P5</span></div>
    </div>

    <div class="section-title">Retro</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP01_premium_96.aac', 'Radio Vinyl', this)" class="btn vinyl"><span class="icon">📻</span><span>Radio Vinyl</span></div>
        <div onclick="play('http://stream.vinylhits.dk/vinylmp3', 'VinylHits', this)" class="btn vinyl"><span class="icon">💿</span><span>VinylHits</span></div>
        <div onclick="play('https://streammp3.retro-radio.dk/retro-mp3', 'Retro', this)" class="btn retro"><span class="icon">📼</span><span>Retro</span></div>
    </div>

    <div class="section-title">Mix</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP27_premium_96.aac', 'Weekend Mix', this)" class="btn mix"><span class="icon">🍹</span><span>Weekend Mix</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP16_premium_96.aac', 'In The Mix', this)" class="btn voice"><span class="icon">🔥</span><span>In The Mix</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP17_premium_96.aac', 'Nova Throwback', this)" class="btn nova"><span class="icon">⏪</span><span>N. Throwback</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP11_premium_96.aac', 'Nova 100% Dansk', this)" class="btn nova"><span class="icon">🇩🇰</span><span>Nova 100% Dansk</span></div>
        <div onclick="play('http://stream1.partyfm.dk/Party128', 'PartyFM', this)" class="btn party"><span class="icon">🥳</span><span>PartyFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100', this)" class="btn vinyl"><span class="icon">🏆</span><span>Top 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', 'Radio Soft Modern', this)" class="btn soft-l"><span class="icon">🌿</span><span>Soft Modern</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', 'Radio Soft Classic', this)" class="btn soft-l"><span class="icon">🎻</span><span>Soft Classic</span></div>
    </div>
</div>

<div class="footer-player">
    <div class="info-stack">
        <div id="current-label">Vælg station</div>
        <div id="current-name">Radio Danmark Pro</div>
    </div>
    <button class="play-btn" onclick="togglePlay()">
        <svg id="ctrl-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
</div>

<video id="audio-engine"></video>

<script>
    const engine = document.getElementById('audio-engine');
    const ctrlIcon = document.getElementById('ctrl-icon');
    const nameLabel = document.getElementById('current-name');
    const statusLabel = document.getElementById('current-label');

    function play(url, name, el) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
        el.classList.add('playing');
        
        const color = getComputedStyle(el).getPropertyValue('--brand-color');
        document.documentElement.style.setProperty('--active-brand', color);

        nameLabel.textContent = name;
        statusLabel.textContent = "Spiller nu";
        document.title = "▶ " + name;
        
        engine.src = url;
        engine.load();
        engine.play().catch(e => console.log("Klik kræves for start"));
        updateIcon(true);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'Radio Danmark',
                album: 'Live'
            });
        }
    }

    function togglePlay() {
        if (engine.paused) {
            engine.play();
            updateIcon(true);
        } else {
            engine.pause();
            updateIcon(false);
        }
    }

    function updateIcon(playing) {
        ctrlIcon.innerHTML = playing 
            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
    }

    engine.onplay = () => updateIcon(true);
    engine.onpause = () => updateIcon(false);
</script>

</body>
</html>
