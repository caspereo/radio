    <style>
        :root {
            --bg: #0a0a0c;
            --panel: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #888;
            --accent: #f39c12;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px 15px 180px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Overskrifter */
        .category-header {
            width: 100%;
            max-width: 500px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 35px 0 15px 5px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-header::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
        }

        /* Grid - Max 3 kolonner */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        /* Station Knapper */
        .btn {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .btn .icon {
            font-size: 22px;
            margin-bottom: 8px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .btn span {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            opacity: 0.7;
        }

        /* Hover & Active States */
        .btn:active {
            transform: scale(0.92);
        }

        /* Unikke farver (Faded til Standby) */
        .btn.active {
            border-color: var(--clr);
            background: rgba(var(--clr-rgb), 0.15);
            box-shadow: 0 0 20px rgba(var(--clr-rgb), 0.2);
        }

        .btn.active .icon, .btn.active span {
            opacity: 1;
            transform: scale(1.1);
        }

        .btn.active::before {
            content: "";
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            background: var(--clr);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--clr);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Footer Player */
        .footer {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 450px;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .info { display: flex; flex-direction: column; }
        .info .label { font-size: 9px; text-transform: uppercase; color: var(--accent); font-weight: 800; }
        #current-name { font-size: 15px; font-weight: 600; margin-top: 2px; }

        .play-btn {
            width: 45px;
            height: 45px;
            background: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        video { display: none; }
    </style>
</head>
